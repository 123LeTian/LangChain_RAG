# ===================================================================
# LLM 模型货架配置
# ===================================================================
# 每个模型条目支持 ${ENV_VAR:default} 语法引用环境变量值
# provider 字段决定运行时从哪个 env 变量解析 API Key:
#   deepseek -> DEEPSEEK_API_KEY, DEEPSEEK_BASE_URL, DEEPSEEK_MODEL_NAME
#   openai   -> OPENAI_API_KEY, OPENAI_BASE_URL, OPENAI_MODEL_NAME
#   qwen     -> QWEN_API_KEY, QWEN_BASE_URL, QWEN_MODEL_NAME
#   glm      -> GLM_API_KEY, GLM_BASE_URL, GLM_MODEL_NAME
#   moonshot -> MOONSHOT_API_KEY, MOONSHOT_BASE_URL, MOONSHOT_MODEL_NAME
#   mock     -> 无需 API Key (仅本地测试)
# ===================================================================

models:
  # ==================== DeepSeek ====================
  - id: deepseek-chat
    provider: deepseek
    display_name: DeepSeek Chat
    model_name: ${DEEPSEEK_MODEL_NAME:deepseek-chat}
    base_url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
    api_key_env: DEEPSEEK_API_KEY
    description: DeepSeek 对话模型，性价比高，中文能力强
    supports_stream: true
    supports_tools: false
    supports_vision: false
    enabled: true
    is_default: true

  - id: deepseek-reasoner
    provider: deepseek
    display_name: DeepSeek Reasoner
    model_name: ${DEEPSEEK_MODEL_NAME:deepseek-reasoner}
    base_url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
    api_key_env: DEEPSEEK_API_KEY
    description: DeepSeek 推理模型，擅长复杂推理和数学
    supports_stream: true
    supports_tools: false
    supports_vision: false
    enabled: true
    is_default: false

  # ==================== OpenAI ====================
  - id: openai-gpt4o-mini
    provider: openai
    display_name: GPT-4o Mini
    model_name: ${OPENAI_MODEL_NAME:gpt-4o-mini}
    base_url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    api_key_env: OPENAI_API_KEY
    description: OpenAI 轻量模型，速度快成本低
    supports_stream: true
    supports_tools: true
    supports_vision: true
    enabled: true
    is_default: false

  - id: openai-gpt4o
    provider: openai
    display_name: GPT-4o
    model_name: gpt-4o
    base_url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    api_key_env: OPENAI_API_KEY
    description: OpenAI 旗舰模型，综合能力强
    supports_stream: true
    supports_tools: true
    supports_vision: true
    enabled: true
    is_default: false

  # ==================== 通义千问 Qwen ====================
  - id: qwen-turbo
    provider: qwen
    display_name: Qwen Turbo
    model_name: ${QWEN_MODEL_NAME:qwen-turbo}
    base_url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api_key_env: QWEN_API_KEY
    description: 通义千问快速模型，适合日常对话
    supports_stream: true
    supports_tools: false
    supports_vision: false
    enabled: true
    is_default: false

  # ==================== 智谱 GLM ====================
  - id: glm-4-flash
    provider: glm
    display_name: GLM-4 Flash
    model_name: ${GLM_MODEL_NAME:glm-4-flash}
    base_url: ${GLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
    api_key_env: GLM_API_KEY
    description: 智谱 GLM 快速模型，免费额度充足
    supports_stream: true
    supports_tools: false
    supports_vision: false
    enabled: true
    is_default: false

  # ==================== Moonshot ====================
  - id: moonshot-v1-8k
    provider: moonshot
    display_name: Moonshot v1-8k
    model_name: ${MOONSHOT_MODEL_NAME:moonshot-v1-8k}
    base_url: ${MOONSHOT_BASE_URL:https://api.moonshot.cn/v1}
    api_key_env: MOONSHOT_API_KEY
    description: 月之暗面模型，中文长文本处理
    supports_stream: true
    supports_tools: false
    supports_vision: false
    enabled: true
    is_default: false

  # ==================== Mock (本地测试) ====================
  - id: mock-chat
    provider: mock
    display_name: Mock Chat
    model_name: mock-chat
    base_url: null
    api_key_env: null
    description: 本地 mock 模型，用于测试，不产生 API 调用
    supports_stream: true
    supports_tools: false
    supports_vision: false
    enabled: true
    is_default: false
